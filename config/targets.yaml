# Crawl targets — one entry per {source, target}.
# Replaces the old channels.txt. Supported sources:
#   youtube_community  target: @handle | channel_id | channel URL
#   reddit             target: r/<subreddit> | u/<user>   (praw, falls back to .rss)
#   rss                target: any RSS/Atom feed URL
#   facebook           target: page slug or URL (Graph API -> auth browser -> public)

targets:
  - { source: youtube_community, target: "@ByteByteGo" }
  - { source: rss,               target: "https://news.ycombinator.com/rss" }
  # - { source: reddit,            target: "r/programming" }
  # - { source: facebook,          target: "https://www.facebook.com/Meta" }
